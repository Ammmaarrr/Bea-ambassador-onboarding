<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Lora:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Cormorant+Garamond:wght@500;600&family=Source+Serif+4:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { background:#f5f0e8; margin:0; padding:30px 50px; color:#1a1a1a; }
  .row { margin-bottom:20px; }
  .lbl { font-family:Arial; font-size:14px; color:#b00; margin-bottom:4px; }
  h1 { margin:0; font-size:68px; line-height:1.04; letter-spacing:-0.02em; font-weight:400; }
  .pf   { font-family:'Playfair Display',serif; }
  .lora { font-family:'Lora',serif; }
  .fr   { font-family:'Fraunces',serif; }
  .ss   { font-family:'Source Serif 4',serif; }
  .cg   { font-family:'Cormorant Garamond',serif; font-weight:600; }
</style>
</head>
<body>
  <div class="row"><div class="lbl">Playfair Display 400</div><h1 class="pf">Welcome to<br>Campus launch</h1></div>
  <div class="row"><div class="lbl">Lora 400</div><h1 class="lora">Welcome to<br>Campus launch</h1></div>
  <div class="row"><div class="lbl">Fraunces 400</div><h1 class="fr">Welcome to<br>Campus launch</h1></div>
  <div class="row"><div class="lbl">Source Serif 4 400</div><h1 class="ss">Welcome to<br>Campus launch</h1></div>
  <div class="row"><div class="lbl">Cormorant Garamond 600</div><h1 class="cg">Welcome to<br>Campus launch</h1></div>
</body>
</html>
